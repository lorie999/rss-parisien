name: Actualitzar feed RSS Parisien

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  generar-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instal·lar llibreries
        run: pip install cloudscraper beautifulsoup4 feedgen

      - name: Executar script
        run: python feed_parisien.py

      - name: Pujar feed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase
          git add parisien.rss
          git diff --cached --quiet || git commit -m "Feed actualitzat" && git push
